<div class="home">
  <div class="hero">
    <div class="glow-orb"></div>
    <h2 class="hero-title">Chain Reaction</h2>
    <p class="hero-subtitle">
      A strategic turn-based game of orbs, explosions, and domination
    </p>
    <p class="hero-hint">
      Check out the <a (click)="goToRules()">game rules</a> before playing
    </p>
  </div>

  <div class="actions">
    <button class="action-btn primary" (click)="goToLocal()">
      <span class="btn-icon">⚔</span>
      <span class="btn-content">
        <span class="btn-label">Pass &amp; Play</span>
        <span class="btn-sub">Local multiplayer on this device</span>
      </span>
    </button>

    <button class="action-btn primary" (click)="goToOnline()" [disabled]="isWakingServer()">
      <span class="btn-icon">🌐</span>
      <span class="btn-content">
        <span class="btn-label">Play Online</span>
        <span class="btn-sub">Play with friends online</span>
      </span>
    </button>
  </div>

  @if (isWakingServer()) {
    <div class="waking-overlay">
      <div class="waking-card">
        <div class="spinner"></div>
        <p class="waking-title">Waking up the server</p>
        <p class="waking-sub">The backend is hosted on a free tier — please bear with me!</p>
      </div>
    </div>
  }

  <footer class="home-footer">Made by rafiul41</footer>
</div>
