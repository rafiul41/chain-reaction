<div class="settings-page">
  <div class="settings-card">
    <button class="back-btn" (click)="goHome()">← Back</button>

    <h1 class="settings-title">Pass &amp; Play</h1>
    <p class="settings-sub">Set up your local game</p>

    <div class="settings-body">
      <div class="field-group">
        <label class="field-label">Players <span class="field-value">{{ playerCnt }}</span></label>
        <input
          type="range"
          min="2"
          max="7"
          [(ngModel)]="playerCnt"
          class="slider"
        />
        <div class="range-marks">
          <span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Rows <span class="field-value">{{ rowCnt }}</span></label>
          <input type="range" min="5" max="8" [(ngModel)]="rowCnt" class="slider" />
          <div class="range-marks"><span>5</span><span>6</span><span>7</span><span>8</span></div>
        </div>
        <div class="field-group">
          <label class="field-label">Cols <span class="field-value">{{ colCnt }}</span></label>
          <input type="range" min="5" max="8" [(ngModel)]="colCnt" class="slider" />
          <div class="range-marks"><span>5</span><span>6</span><span>7</span><span>8</span></div>
        </div>
      </div>

      <div class="players-section">
        <p class="section-label">Player Names <span class="optional">(optional)</span></p>
        <div class="player-inputs">
          <div *ngFor="let i of playerSlots" class="player-input-row">
            <span class="color-dot" [style.background]="engine.allPlayers[i].color"></span>
            <input
              type="text"
              [(ngModel)]="playerNames[i]"
              [placeholder]="engine.allPlayers[i].color"
              maxlength="16"
              class="name-input"
            />
          </div>
        </div>
      </div>
    </div>

    <button class="start-btn fancy-button-1" (click)="startGame()">Start Game</button>
  </div>
</div>
