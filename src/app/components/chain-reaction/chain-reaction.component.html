<div class="chain-reaction">
  <div class="game-bar">
    <button (click)="goHome()" class="game-btn">
      ← Home
    </button>

    <div class="turn-indicator" [style.--player-color]="players[playerInd].color">
      <span class="turn-dot"></span>
      <span class="turn-text" [ngClass]="{ 'text-vibrate': isMoveTextToVibrate }">
        <span [style.color]="players[playerInd].color">{{ players[playerInd].color }}</span>'s turn
      </span>
      <span class="turn-count">Move #{{ turnCnt + 1 }}</span>
    </div>

    <button (click)="restart()" class="game-btn">
      ↺ Restart
    </button>
  </div>

  <div *ngIf="isGameOver" class="game-over-banner">
    <div class="game-over-inner">
      <div class="game-over-label">Game Over</div>
      <div class="game-over-winner" [style.color]="currentColor">
        {{ currentColor }} wins!
      </div>
      <div class="game-over-sub">All orbs belong to {{ currentColor }}</div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas (click)="onCellClick($event)" #canvas></canvas>
  </div>
</div>

<dialog
  id="confirmation-modal"
  [ngStyle]="{ display: isModalShowing ? 'flex' : 'none' }"
>
  <div class="modal-backdrop" (click)="closeModal()"></div>
  <div class="modal-card">
    <div class="modal-icon">⚠</div>
    <h2 class="modal-title">Leave game?</h2>
    <p class="modal-body">All progress will be lost.</p>
    <div class="modal-actions">
      <button (click)="closeModal()" class="fancy-button-1">Cancel</button>
      <button (click)="doModalAction()" class="modal-confirm-btn">Confirm</button>
    </div>
  </div>
</dialog>
